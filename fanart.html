<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>DingleVR Fan Art</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    :root {
      --bg: #050509;
      --bg2: #101018;
      --accent: #ff4747;
      --mint: #a6f2c1;
      --text: #f9f9ff;
      --muted: #a0a3b8;
      --card: #14141c;
      --border: #262637;
      --radius-lg: 20px;
      --radius-md: 12px;
      --radius-pill: 999px;
      --shadow: 0 18px 40px rgba(0, 0, 0, 0.7);
      --transition: 0.2s ease-out;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: system-ui, sans-serif;
      background: radial-gradient(circle at top, #191927 0, #050509 55%);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    main {
      max-width: 1000px;
      margin: 0 auto;
      padding: 80px 20px 60px;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
    }

    .title-block h1 {
      font-size: 26px;
      font-weight: 800;
      background: linear-gradient(120deg, var(--accent), var(--mint));
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
    }

    .title-block p {
      font-size: 13px;
      color: var(--muted);
    }

    .back-btn {
      padding: 8px 14px;
      border-radius: var(--radius-pill);
      border: 1px solid rgba(166,242,193,0.4);
      background: rgba(10,16,14,0.9);
      color: var(--mint);
      cursor: pointer;
    }

    .fanart-card {
      padding: 22px 20px;
      border-radius: var(--radius-lg);
      background: var(--bg2);
      border: 1px solid rgba(166,242,193,0.25);
      box-shadow: var(--shadow);
    }

    .fanart-card h2 {
      font-size: 20px;
      margin-bottom: 6px;
    }

    .fanart-sub {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 18px;
    }

    .form-row,
    .file-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 14px;
    }

    .form-row input,
    .form-row textarea {
      flex: 1 1 160px;
      padding: 10px 12px;
      border-radius: var(--radius-md);
      border: 1px solid var(--border);
      background: #0c0c12;
      color: var(--text);
      font-size: 14px;
    }

    .submit-btn {
      padding: 10px 18px;
      border-radius: var(--radius-md);
      background: linear-gradient(135deg, var(--accent), var(--mint));
      color: #050509;
      font-weight: 600;
      border: none;
      cursor: pointer;
    }

    .status {
      font-size: 12px;
      margin-bottom: 10px;
      color: var(--muted);
    }

    .status.ok { color: #a6f2c1; }
    .status.err { color: #ff8a8a; }

    .gallery {
      margin-top: 16px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 14px;
    }

    .gallery-item {
      background: var(--card);
      border-radius: var(--radius-md);
      border: 1px solid var(--border);
      overflow: hidden;
      box-shadow: 0 10px 24px rgba(0,0,0,0.6);
    }

    .gallery-item img {
      width: 100%;
      height: 160px;
      object-fit: cover;
    }

    .gallery-body {
      padding: 8px 10px;
      font-size: 13px;
    }

    .gallery-body strong {
      color: var(--mint);
    }

    .gallery-meta {
      font-size: 11px;
      color: var(--muted);
      margin-top: 2px;
    }

    .footer-note {
      margin-top: 18px;
      font-size: 12px;
      color: var(--muted);
      font-style: italic;
      text-align: right;
    }
  </style>
</head>
<body>

  <main>

    <header>
      <div class="title-block">
        <h1>DingleVR fan art</h1>
        <p>Upload your art and let Dingle see what you cooked.</p>
      </div>

      <a href="index.html">
        <button class="back-btn">← Back to hub</button>
      </a>
    </header>

    <section class="fanart-card">
      <h2>Post fan art</h2>
      <p class="fanart-sub">Your art appears below AND gets sent to Dingle via Discord webhook.</p>

      <div class="form-row">
        <input id="faName" placeholder="Your name" />
        <textarea id="faCaption" placeholder="Caption / message"></textarea>
      </div>

      <div class="file-row">
        <input id="faFile" type="file" accept="image/*" />
        <button class="submit-btn" onclick="submitFanArt()">Post fan art</button>
      </div>

      <div id="faStatus" class="status"></div>

      <div class="gallery" id="faGallery"></div>

      <div class="footer-note">
        Thx, this is peak — DingleVR
      </div>
    </section>

  </main>

  <script>
    const FA_STORAGE_KEY = "dingleFanArt_v1";
    const WEBHOOK_URL = "<https://discord.com/api/webhooks/1494469326676164650/wNiYyCW0vfPEcW193Q8YzhxK3MraTttxLqyHsbGUFqEIyNzDPOLa8HJjYF79Kb43PVze>"; // ← replace locally

    let fanArtItems = [];
    const galleryEl = document.getElementById("faGallery");
    const statusEl = document.getElementById("faStatus");

    function loadFanArt() {
      try {
        const raw = localStorage.getItem(FA_STORAGE_KEY);
        if (raw) fanArtItems = JSON.parse(raw);
      } catch {
        fanArtItems = [];
      }
      renderFanArt();
    }

    function saveFanArt() {
      localStorage.setItem(FA_STORAGE_KEY, JSON.stringify(fanArtItems));
    }

    function renderFanArt() {
      galleryEl.innerHTML = "";

      if (!fanArtItems.length) {
        const empty = document.createElement("div");
        empty.style.color = "#777a90";
        empty.textContent = "No fan art yet. Be the first.";
        galleryEl.appendChild(empty);
        return;
      }

      fanArtItems.forEach((item) => {
        const card = document.createElement("div");
        card.className = "gallery-item";
        card.innerHTML = `
          <img src="${item.dataUrl}" />
          <div class="gallery-body">
            <div><strong>${item.name}</strong></div>
            <div>${item.caption}</div>
            <div class="gallery-meta">${item.time}</div>
          </div>
        `;
        galleryEl.appendChild(card);
      });
    }

    function setStatus(msg, type) {
      statusEl.textContent = msg;
      statusEl.className = "status " + (type || "");
    }

    async function submitFanArt() {
      const name = document.getElementById("faName").value.trim();
      const caption = document.getElementById("faCaption").value.trim();
      const file = document.getElementById("faFile").files[0];

      if (!name || !caption || !file) {
        setStatus("Fill in name, caption, and choose an image.", "err");
        return;
      }

      setStatus("Uploading...", "");

      try {
        const dataUrl = await fileToDataURL(file);
        const time = new Date().toLocaleString();

        fanArtItems.unshift({ name, caption, time, dataUrl });
        saveFanArt();
        renderFanArt();

        const formData = new FormData();
        formData.append("content", `New fan art from **${name}**:\n${caption}`);
        formData.append("file", file, file.name || "fanart.png");

        await fetch(WEBHOOK_URL, { method: "POST", body: formData });

        setStatus("Fan art posted!", "ok");

        document.getElementById("faName").value = "";
        document.getElementById("faCaption").value = "";
        document.getElementById("faFile").value = "";

      } catch (err) {
        console.error(err);
        setStatus("Saved locally, but webhook failed. Check URL.", "err");
      }
    }

    function fileToDataURL(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result);
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }

    loadFanArt();
  </script>

</body>
</html>
