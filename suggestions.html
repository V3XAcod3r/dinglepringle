<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>DingleVR Suggestions</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    :root {
      --bg: #050509;
      --bg2: #101018;
      --accent: #ff4747;
      --mint: #a6f2c1;
      --text: #f9f9ff;
      --muted: #a0a3b8;
      --card: #14141c;
      --border: #262637;
      --radius-lg: 20px;
      --radius-md: 12px;
      --radius-pill: 999px;
      --shadow: 0 18px 40px rgba(0, 0, 0, 0.7);
      --transition: 0.2s ease-out;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: system-ui, sans-serif;
      background: radial-gradient(circle at top, #191927 0, #050509 55%);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    main {
      max-width: 900px;
      margin: 0 auto;
      padding: 80px 20px 60px;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
    }

    .title-block h1 {
      font-size: 26px;
      font-weight: 800;
      background: linear-gradient(120deg, var(--accent), var(--mint));
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
    }

    .title-block p {
      font-size: 13px;
      color: var(--muted);
    }

    .back-btn {
      padding: 8px 14px;
      border-radius: var(--radius-pill);
      border: 1px solid rgba(166,242,193,0.4);
      background: rgba(10,16,14,0.9);
      color: var(--mint);
      cursor: pointer;
    }

    .suggestions {
      padding: 22px 20px;
      border-radius: var(--radius-lg);
      background: var(--bg2);
      border: 1px solid rgba(166,242,193,0.25);
      box-shadow: var(--shadow);
    }

    .suggestions h2 {
      font-size: 20px;
      margin-bottom: 6px;
    }

    .suggestions-sub {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 18px;
    }

    .input-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 18px;
    }

    .input-row input,
    .input-row textarea {
      flex: 1 1 160px;
      padding: 10px 12px;
      border-radius: var(--radius-md);
      border: 1px solid var(--border);
      background: #0c0c12;
      color: var(--text);
      font-size: 14px;
    }

    .post-btn {
      padding: 10px 18px;
      border-radius: var(--radius-md);
      background: linear-gradient(135deg, var(--accent), var(--mint));
      color: #050509;
      font-weight: 600;
      border: none;
      cursor: pointer;
    }

    .suggestion-list {
      margin-top: 6px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .suggestion-item {
      background: var(--card);
      border-radius: var(--radius-md);
      border: 1px solid var(--border);
      padding: 10px 12px;
      font-size: 13px;
    }

    .suggestion-item strong {
      color: var(--mint);
    }

    .suggestion-meta {
      font-size: 11px;
      color: var(--muted);
      margin-top: 2px;
    }
  </style>
</head>
<body>

  <main>

    <header>
      <div class="title-block">
        <h1>DingleVR video ideas</h1>
        <p>Drop your cursed challenges or VR chaos concepts.</p>
      </div>

      <a href="index.html">
        <button class="back-btn">← Back to hub</button>
      </a>
    </header>

    <section class="suggestions">
      <h2>Post a suggestion</h2>
      <p class="suggestions-sub">Ideas save on your device only (localStorage).</p>

      <div class="input-row">
        <input id="nameInput" placeholder="Your name" />
        <textarea id="suggestInput" placeholder="Your video idea"></textarea>
        <button class="post-btn" onclick="postSuggestion()">Post</button>
      </div>

      <div class="suggestion-list" id="suggestionList"></div>
    </section>

  </main>

  <script>
    let suggestions = [];
    const STORAGE_KEY = "dingleSuggestions_v1";
    const listEl = document.getElementById("suggestionList");

    function loadSuggestions() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (raw) suggestions = JSON.parse(raw);
      } catch {
        suggestions = [];
      }
      renderSuggestions();
    }

    function saveSuggestions() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(suggestions));
    }

    function renderSuggestions() {
      listEl.innerHTML = "";

      if (!suggestions.length) {
        const empty = document.createElement("div");
        empty.style.color = "#777a90";
        empty.textContent = "No ideas yet. Be the first.";
        listEl.appendChild(empty);
        return;
      }

      suggestions.forEach((s) => {
        const div = document.createElement("div");
        div.className = "suggestion-item";
        div.innerHTML = `
          <div><strong>${s.name}</strong>: ${s.text}</div>
          <div class="suggestion-meta">${s.time}</div>
        `;
        listEl.appendChild(div);
      });
    }

    function postSuggestion() {
      const name = document.getElementById("nameInput").value.trim();
      const text = document.getElementById("suggestInput").value.trim();

      if (!name || !text) return;

      const time = new Date().toLocaleString();
      suggestions.unshift({ name, text, time });

      saveSuggestions();
      renderSuggestions();

      document.getElementById("nameInput").value = "";
      document.getElementById("suggestInput").value = "";
    }

    loadSuggestions();
  </script>

</body>
</html>
